services:
  opml:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    volumes:
      - ./files:/audiobooks
      - opml-data:/data
    environment:
      - FILES=/audiobooks
      - DATA=/data
      - PORT=3000
      - ADMIN_USER=admin
      - ADMIN_TOKEN=secret
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/feed.opml"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  opml-data:
